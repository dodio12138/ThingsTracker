services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION}
    container_name: thingstracker-web
    environment:
      - NODE_ENV=production
      - PORT=${WEB_PORT}
    expose:
      - "${WEB_PORT}"
    restart: unless-stopped

  pocketbase:
    build:
      context: ./pb
      dockerfile: Dockerfile
      args:
        POCKETBASE_VERSION: ${POCKETBASE_VERSION}
    container_name: thingstracker-pocketbase
    expose:
      - "${POCKETBASE_PORT}"
    volumes:
      - pb_data:/pb/pb_data
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: thingstracker-nginx
    ports:
      - "${NGINX_HTTP_PORT}:80"
      - "${NGINX_HTTPS_PORT}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - pocketbase
    restart: unless-stopped

volumes:
  pb_data:
